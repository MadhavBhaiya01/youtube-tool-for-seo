<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube SEO Tag Generator</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <style>
        .main-title {
            background: linear-gradient(90deg, #2563eb, #22c55e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .gradient-header {
            background: linear-gradient(
                    135deg,
                    rgba(37, 99, 235, .08),
                    rgba(34, 197, 94, .08)
            );
            border: 1px dashed #e2e8f0;
        }

        .tag {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid #e2e8f0;
        }

        .error {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border-left: 4px solid #ef4444;
        }

        .success {
            background: rgba(16, 185, 129, 0.12);
            color: #10b981;
            border-left: 4px solid #10b981;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-900 dark:text-slate-100">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"
     th:with="activePage='home'">
</div>

<div class="container mx-auto px-4 max-w-3xl mt-10 pb-10">

    <!-- Heading -->
    <div class="text-center mb-8">
        <h1 class="main-title text-4xl md:text-5xl font-bold mb-4">
            YouTube SEO Tag Generator 
        </h1>

        <div class="gradient-header rounded-xl p-4">
            <p class="text-slate-600 dark:text-slate-300">
                Enter a YouTube video title and get SEO tags from similar videos.
            </p>
        </div>
    </div>

    <!-- Search Form -->
    <div class="bg-white dark:bg-slate-800 shadow-lg rounded-xl p-6 mb-8">

        <form th:action="@{/youtube/search}" method="post">

            <label class="block mb-2 font-medium">
                Video Title
            </label>

            <input
                    type="text"
                    name="videoTitle"
                    placeholder="Enter YouTube video title"
                    required
                    class="w-full border rounded-lg px-4 py-3 dark:bg-slate-700 dark:border-slate-600 mb-4">

            <button
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg">
                Generate SEO Tags
            </button>

        </form>

    </div>

    <!-- Error Message -->
    <div th:if="${error}"
         class="error p-4 rounded-lg mb-4"
         th:text="${error}">
    </div>

    <!-- Primary Video -->
    <div th:if="${primaryVideo != null}"
         class="bg-white dark:bg-slate-800 shadow-lg rounded-xl p-6 mb-6">

        <h2 class="text-xl font-bold mb-3">
            <i class="bi bi-star-fill text-blue-500"></i>
            Primary Video
        </h2>

        <p class="font-semibold"
           th:text="${primaryVideo.title}">
        </p>

        <p class="text-slate-500 mb-4"
           th:text="${primaryVideo.channelTitle}">
        </p>

        <div id="primaryTags">

            <span th:each="tag : ${primaryVideo.tags}"
                  class="tag inline-block px-3 py-2 rounded-full mr-2 mb-2">

                <span th:text="${tag}"></span>

            </span>

        </div>

        <button
                type="button"
                onclick="copyPrimaryTags()"
                class="mt-4 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">

            Copy Tags

        </button>

    </div>

    <!-- Related Videos -->
    <div th:if="${relatedVideos != null and !#lists.isEmpty(relatedVideos)}"
         class="bg-white dark:bg-slate-800 shadow-lg rounded-xl p-6">

        <h2 class="text-xl font-bold mb-4">
            Related Videos
        </h2>

        <div th:each="video : ${relatedVideos}"
             class="border-b border-slate-200 dark:border-slate-700 pb-4 mb-4">

            <h3 class="font-semibold mb-2"
                th:text="${video.title}">
            </h3>

            <div>

                <span th:if="${#lists.isEmpty(video.tags)}"
                      class="italic text-slate-500">
                    No Tags Available
                </span>

                <span th:each="tag : ${video.tags}"
                      class="tag inline-block px-3 py-2 rounded-full mr-2 mb-2">

                    <span th:text="${tag}"></span>

                </span>

            </div>

        </div>

    </div>

    <div id="copySuccess"
         class="success p-4 rounded-lg mt-4 hidden">
        Tags copied successfully!
    </div>

</div>

<script>

    function copyPrimaryTags() {

        let tags = [];

        document.querySelectorAll("#primaryTags span span").forEach(item => {
            tags.push(item.innerText);
        });

        navigator.clipboard.writeText(tags.join(", "))
            .then(() => {

                const msg = document.getElementById("copySuccess");

                msg.classList.remove("hidden");

                setTimeout(() => {
                    msg.classList.add("hidden");
                }, 2000);

            });
    }

</script>

</body>
</html>
