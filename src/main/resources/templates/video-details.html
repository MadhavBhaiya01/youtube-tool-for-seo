<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>YouTube Video Data Retriever</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <style>

        .main-title{
            background:linear-gradient(90deg,#2563eb,#22c55e);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
        }

        .gradient-header{
            background:linear-gradient(
                    135deg,
                    rgba(37,99,235,.08),
                    rgba(34,197,94,.08)
            );
            border:1px dashed #e2e8f0;
        }

        .thumb-box{
            border:1px solid #e2e8f0;
            border-radius:12px;
            overflow:hidden;
        }

        .tag{
            background:rgba(34,197,94,.15);
            border:1px solid #e2e8f0;
            border-radius:9999px;
        }

        .desc-box{
            white-space:pre-wrap;
            max-height:250px;
            overflow:auto;
            padding:12px;
            border:1px solid #e2e8f0;
            border-radius:12px;
        }

        .error{
            background:rgba(239,68,68,.12);
            color:#ef4444;
            border-left:4px solid #ef4444;
        }

    </style>

</head>

<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-900 dark:text-slate-100">

<div th:replace="~{fragments/navbar :: navbar}"
     th:with="activePage='video'">
</div>

<div class="container mx-auto px-4 max-w-4xl mt-10 pb-10">

    <!-- Heading -->

    <div class="text-center mb-8">

        <h1 class="main-title text-4xl md:text-5xl font-bold mb-4">
            YouTube Video Data Retriever
        </h1>

        <div class="gradient-header rounded-xl p-4">

            <p class="text-slate-600 dark:text-slate-300">
                Enter a YouTube Video URL or ID to fetch complete video information.
            </p>

        </div>

    </div>

    <!-- Form -->

    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6 mb-8">

        <form th:action="@{/youtube/video-details}"
              method="post">

            <label class="block mb-2 font-medium">
                YouTube Video URL or ID
            </label>

            <input
                    type="text"
                    name="videoUrlOrId"
                    required
                    th:value="${videoUrlOrId}"
                    placeholder="https://youtube.com/watch?v=..."
                    class="w-full border rounded-lg px-4 py-3 dark:bg-slate-700 dark:border-slate-600 mb-4">

            <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg">

                Fetch Video Data

            </button>

        </form>

        <!-- Error -->

        <div th:if="${error}"
             class="error mt-4 p-4 rounded-lg"
             th:text="${error}">
        </div>

    </div>

    <!-- Video Result -->

    <div th:if="${videoDetails != null}"
         class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

            <!-- Thumbnail -->

            <div>

                <div class="thumb-box">

                    <img
                            th:src="${videoDetails.thumbnailUrl}"
                            th:alt="${videoDetails.title}"
                            class="w-full h-auto">

                </div>

                <div class="mt-4">

                    <a th:href="${videoDetails.thumbnailUrl}"
                       target="_blank"
                       class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">

                        <i class="bi bi-download"></i>
                        Download Thumbnail

                    </a>

                </div>

            </div>

            <!-- Details -->

            <div>

                <h2 class="text-2xl font-bold mb-3">

                    <i class="bi bi-film text-blue-500"></i>

                    <span th:text="${videoDetails.title}">
                    </span>

                </h2>

                <div class="text-slate-500 mb-4">

                    <div class="mb-2">

                        <i class="bi bi-person-video"></i>

                        <span th:text="${videoDetails.channelTitle}">
                        </span>

                    </div>

                    <div>

                        <i class="bi bi-calendar-event"></i>

                        <span th:text="${videoDetails.publishedAt}">
                        </span>

                    </div>

                </div>

                <!-- Description -->

                <h3 class="font-bold mb-2">

                    Description

                </h3>

                <div class="desc-box mb-6">

                    <span th:text="${videoDetails.description}">
                    </span>

                </div>

                <!-- Tags -->

                <h3 class="font-bold mb-3">

                    Tags

                </h3>

                <div th:if="${videoDetails.tags != null and !#lists.isEmpty(videoDetails.tags)}">

                    <span th:each="tag : ${videoDetails.tags}"
                          class="tag inline-block px-3 py-2 mr-2 mb-2">

                        <span th:text="${tag}">
                        </span>

                    </span>

                </div>

                <div th:if="${videoDetails.tags == null or #lists.isEmpty(videoDetails.tags)}"
                     class="text-slate-500 italic">

                    No Tags Available

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
