<nav th:fragment="navbar"
     xmlns:th="http://www.thymeleaf.org"
     class="bg-white dark:bg-slate-800 shadow-lg border-b border-slate-200 dark:border-slate-700 mt-4 mb-8 rounded-2xl transition-colors duration-300">

    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center py-4">

            <!-- Logo -->
            <a href="/"
               class="text-blue-600 dark:text-blue-400 font-bold text-xl hover:text-blue-700 dark:hover:text-blue-300 transition-colors duration-200">
                YouTube Tool
            </a>

            <div class="flex items-center space-x-6">

                <!-- SEO -->
                <a href="/"
                   class="text-slate-700 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 py-2 px-3 rounded-lg"
                   th:classappend="${activePage} == 'seo'
                   ? ' text-blue-600 dark:text-blue-400 font-semibold bg-blue-50 dark:bg-blue-900/20'">
                    SEO Tags
                </a>

                <!-- Thumbnail -->
                <a href="/thumbnail"
                   class="text-slate-700 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 py-2 px-3 rounded-lg"
                   th:classappend="${activePage} == 'thumbnails'
                   ? ' text-blue-600 dark:text-blue-400 font-semibold bg-blue-50 dark:bg-blue-900/20'">
                    Thumbnails
                </a>

                <!-- Video Data -->
                <a href="/video-details"
                   class="text-slate-700 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 py-2 px-3 rounded-lg"
                   th:classappend="${activePage} == 'video'
                   ? ' text-blue-600 dark:text-blue-400 font-semibold bg-blue-50 dark:bg-blue-900/20'">
                    Video Data
                </a>

                <!-- Theme Toggle -->
                <button id="themeToggle"
                        type="button"
                        class="w-10 h-10 flex items-center justify-center border border-blue-600 dark:border-blue-400 rounded-lg">
                    <i id="themeIcon" class="bi bi-sun-fill"></i>
                </button>

            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('themeToggle');
        const icon = document.getElementById('themeIcon');

        if(localStorage.getItem('theme') === 'dark'){
            document.documentElement.classList.add('dark');
            icon.className = 'bi bi-moon-fill';
        }

        toggleBtn.addEventListener('click', () => {

            const html = document.documentElement;

            if(html.classList.contains('dark')){
                html.classList.remove('dark');
                localStorage.setItem('theme','light');
                icon.className='bi bi-sun-fill';
            }else{
                html.classList.add('dark');
                localStorage.setItem('theme','dark');
                icon.className='bi bi-moon-fill';
            }

        });
    </script>

</nav>
