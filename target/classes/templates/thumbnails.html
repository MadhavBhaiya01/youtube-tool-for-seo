<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>YouTube Thumbnail Downloader</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <style>

        .main-title{
            background:linear-gradient(90deg,#2563eb,#22c55e);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
        }

        .gradient-header{
            background:linear-gradient(
                    135deg,
                    rgba(37,99,235,.08),
                    rgba(34,197,94,.08)
            );
            border:1px dashed #e2e8f0;
        }

        .thumb-box{
            border:1px solid #e2e8f0;
            border-radius:12px;
            overflow:hidden;
        }

        .error{
            background:rgba(239,68,68,.12);
            color:#ef4444;
            border-left:4px solid #ef4444;
        }

    </style>

</head>

<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-900 dark:text-slate-100">

<!-- Navbar -->

<div th:replace="~{fragments/navbar :: navbar}"
     th:with="activePage='thumbnails'">
</div>

<div class="container mx-auto px-4 max-w-3xl mt-10 pb-10">

    <!-- Header -->

    <div class="text-center mb-8">

        <h1 class="main-title text-4xl md:text-5xl font-bold mb-4">
            YouTube Thumbnail Downloader
        </h1>

        <div class="gradient-header rounded-xl p-4">

            <p class="text-slate-600 dark:text-slate-300">
                Enter a YouTube Video URL or Video ID
                to download the thumbnail.
            </p>

        </div>

    </div>

    <!-- Form -->

    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6 mb-8">

        <form th:action="@{/get-thumbnail}"
              method="post">

            <label
                    for="videoUrlOrId"
                    class="block mb-2 font-medium">

                YouTube Video URL or ID

            </label>

            <input
                    type="text"
                    id="videoUrlOrId"
                    name="videoUrlOrId"
                    required
                    placeholder="https://youtube.com/watch?v=..."
                    class="w-full border rounded-lg px-4 py-3 dark:bg-slate-700 dark:border-slate-600 mb-4">

            <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg">

                Get Thumbnail

            </button>

        </form>

        <!-- Error -->

        <div th:if="${error}"
             class="error mt-4 p-4 rounded-lg"
             th:text="${error}">
        </div>

    </div>

    <!-- Thumbnail Result -->

    <div th:if="${thumbnailUrl != null}"
         class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-6">

        <h2 class="text-2xl font-bold mb-4">

            <i class="bi bi-image text-blue-500"></i>
            Thumbnail Preview

        </h2>

        <div class="thumb-box">

            <img
                    th:src="${thumbnailUrl}"
                    alt="YouTube Thumbnail"
                    class="w-full h-auto">

        </div>

        <div class="mt-6 flex gap-4">

            <a th:href="${thumbnailUrl}"
               target="_blank"
               class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded">

                <i class="bi bi-download"></i>
                Download Thumbnail

            </a>

            <button
                    type="button"
                    th:data-url="${thumbnailUrl}"
                    onclick="copyThumbnailUrl(this)"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">

                <i class="bi bi-clipboard"></i>
                Copy URL

            </button>

        </div>

    </div>

    <!-- Success Message -->

    <div id="copySuccess"
         class="hidden mt-4 p-4 rounded-lg bg-green-100 text-green-700">

        Thumbnail URL copied successfully.

    </div>

</div>

<script>

    function copyThumbnailUrl(button){

        const url = button.getAttribute("data-url");

        navigator.clipboard.writeText(url)
            .then(() => {

                const msg =
                    document.getElementById("copySuccess");

                msg.classList.remove("hidden");

                setTimeout(() => {
                    msg.classList.add("hidden");
                },2000);

            });

    }

</script>

</body>
</html>
